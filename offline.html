<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Ottawa Run Routes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5; color: #1a1a1a; text-align: center; padding: 24px;
      gap: 16px;
    }
    .icon { font-size: 56px; }
    h1 { font-size: 22px; font-weight: 700; }
    p  { font-size: 14px; color: #555; max-width: 280px; line-height: 1.5; }
    button {
      margin-top: 8px; padding: 12px 24px; background: #2563eb; color: #fff;
      border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="icon">📍</div>
  <h1>You're offline</h1>
  <p>Connect to the internet to generate new routes. Previously loaded routes aren't available offline.</p>
  <button onclick="location.reload()">Try again</button>
</body>
</html>
